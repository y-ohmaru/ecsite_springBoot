<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>購入確認 - サンプルECサイト</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<style>
		.confirm-container {
			max-width: 800px;
			margin: 0 auto;
			padding: 20px;
		}

		.address-section,
		.cart-section {
			margin-bottom: 30px;
		}

		.address-section h2,
		.cart-section h2 {
			margin-bottom: 15px;
			border-bottom: 1px solid #ddd;
			padding-bottom: 5px;
		}

		.address-field {
			margin: 8px 0;
			font-size: 16px;
		}

		.cart-item {
			display: flex;
			align-items: center;
			border-bottom: 1px solid #ddd;
			padding: 10px 0;
		}

		.cart-item:last-child {
			border-bottom: none;
		}

		.item-image img {
			max-width: 100px;
			margin-right: 20px;
			border: 1px solid #ccc;
			padding: 5px;
			border-radius: 4px;
		}

		.item-details {
			flex-grow: 1;
		}

		.item-details p {
			margin: 4px 0;
		}

		.total-amount {
			text-align: right;
			font-size: 20px;
			font-weight: bold;
			margin-top: 20px;
		}

		.action-buttons {
			margin-top: 30px;
			text-align: center;
		}

		.action-buttons .btn {
			padding: 10px 20px;
			font-size: 16px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			text-decoration: none;
			display: inline-block;
			margin: 0 10px;
		}

		.back-btn {
			background-color: #6c757d;
			color: #fff;
		}

		.confirm-btn {
			background-color: #007bff;
			color: #fff;
		}
	</style>
</head>

<body>
	<!-- 共通ヘッダー -->
	<div th:replace="~{header :: common-header}"></div>

	<div class="confirm-container">
		<h1>購入確認</h1>

		<!-- 配送先住所情報 -->
		<div class="address-section">
			<h2>配送先住所</h2>
			<div class="address-field">
				<strong>郵便番号:</strong>
				<span th:text="${address.postal_code}">000-0000</span>
			</div>
			<div class="address-field">
				<strong>住所:</strong>
				<span th:text="${address.delivery_address}">東京都新宿区西新宿1-1-1</span>
			</div>
			<div class="address-field">
				<strong>氏名:</strong>
				<span th:text="${address.customer_name}">山田太郎</span>
			</div>
			<div class="address-field">
				<strong>電話番号:</strong>
				<span th:text="${address.phone_number}">03-1234-5678</span>
			</div>
		</div>

		<!-- カート内商品一覧 -->
		<div class="cart-section">
			<h2>購入商品</h2>
			<div th:if="${cart == null or #lists.isEmpty(cart.items)}">
				<p>カートは空です。</p>
			</div>
			<div th:if="${cart != null and !#lists.isEmpty(cart.items)}">
				<div th:each="item : ${cart.items}" class="cart-item">
					<div class="item-image">
						<!-- CartItem の product_form を利用（フィールド名が product_form の場合） -->
						<img th:src="${item.product_form.image_url}" alt="商品画像" />
					</div>
					<div class="item-details">
						<p>商品名: <span th:text="${item.product_form.product_name}">商品名</span></p>
						<p>数量: <span th:text="${item.quantity}">数量</span></p>
						<p>単価: <span th:text="${item.product_form.price}">単価</span> 円</p>
						<p>小計: <span th:text="${item.product_form.price * item.quantity}">小計</span> 円</p>
					</div>
				</div>
			</div>
			<div class="total-amount" th:if="${cart != null}">
				合計金額: <span th:text="${total_amount}">0</span> 円
			</div>
		</div>

		<!-- アクションボタン -->
		<div class="action-buttons" th:if="${cart != null and !#lists.isEmpty(cart.items)}">
			<form th:action="@{/order/confirm}" th:object="${address}" method="post">
				<!-- Hidden フィールドで住所情報を送信 -->
				<input type="hidden" th:field="*{postal_code}" />
				<input type="hidden" th:field="*{delivery_address}" />
				<input type="hidden" th:field="*{customer_name}" />
				<input type="hidden" th:field="*{phone_number}" />

				<div class="action-buttons" th:if="${cart != null and !#lists.isEmpty(cart.items)}">
					<a th:href="@{/order/address}" class="btn back-btn">戻る</a>
					<button type="submit" class="btn confirm-btn">購入確定</button>
				</div>
			</form>
		</div>
	</div>

	<!-- 共通フッター -->
	<div th:replace="~{footer :: common-footer}"></div>
</body>

</html>
