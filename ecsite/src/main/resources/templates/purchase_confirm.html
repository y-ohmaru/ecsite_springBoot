<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>購入確認 - サンプルECサイト</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .confirm-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .confirm-item {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .confirm-item:last-child {
            border-bottom: none;
        }
        .item-image img {
            max-width: 100px;
            margin-right: 20px;
            border: 1px solid #ccc;
            padding: 5px;
            border-radius: 4px;
        }
        .item-details {
            flex-grow: 1;
        }
        .item-details p {
            margin: 4px 0;
        }
        .total-amount {
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
        /* アクションボタンの共通スタイル */
        .action-buttons {
            margin-top: 20px;
            text-align: center;
        }
        .action-buttons .btn {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .confirm-btn {
            background-color: #007bff;
            color: #fff;
        }
        .back-btn {
            background-color: #6c757d;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- 共通ヘッダーのフラグメント -->
    <div th:replace="~{header :: common-header}"></div>
    
    <div class="confirm-container">
        <h1>購入確認</h1>
        <div th:if="${cart == null or #lists.isEmpty(cart.items)}">
            <p>カートは空です。</p>
        </div>
        <div th:if="${cart != null and !#lists.isEmpty(cart.items)}">
            <div th:each="item : ${cart.items}" class="confirm-item">
                <div class="item-image">
                    <img th:src="${item.product_form.image_url}" alt="商品画像" />
                </div>
                <div class="item-details">
                    <p>商品名: <span th:text="${item.product_form.product_name}">商品名</span></p>
                    <p>数量: <span th:text="${item.quantity}">数量</span></p>
                    <p>単価: <span th:text="${item.product_form.price}">単価</span> 円</p>
                    <p>小計: <span th:text="${item.quantity * item.product_form.price}">小計</span> 円</p>
                </div>
            </div>
            <div class="total-amount">
                合計金額: <span th:text="${total_amount}">0</span> 円
            </div>
        </div>
        
        <div class="action-buttons" th:if="${cart != null and !#lists.isEmpty(cart.items)}">
            <!-- 購入実行ボタン -->
            <form th:action="@{/order/address}" method="get" style="display:inline;">
                <button type="submit" class="btn confirm-btn">購入する</button>
            </form>
            <!-- カートに戻るボタン -->
            <a th:href="@{/cart}" class="btn back-btn">カートに戻る</a>
        </div>
    </div>
    
    <!-- 共通フッターのフラグメント -->
    <div th:replace="~{footer :: common-footer}"></div>
</body>
</html>
