<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>住所入力 - サンプルECサイト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f0f2f5;
      --surface:     #ffffff;
      --accent:      #2563eb;
      --accent-dark: #1d4ed8;
      --accent-light:#eff6ff;
      --danger:      #dc2626;
      --success:     #16a34a;
      --text-1:      #0f172a;
      --text-2:      #475569;
      --text-3:      #94a3b8;
      --border:      #e2e8f0;
      --radius:      12px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07);
    }

    body {
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── STEP BAR ─── */
    .step-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }
    .step-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .step-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-circle.done {
      background: #16a34a;
      color: #fff;
    }
    .step-circle.active {
      background: #131921;
      color: #ffffff;
    }
    .step-circle.inactive {
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text-3);
    }
    .step-label {
      font-size: 13px;
      font-weight: 500;
    }
    .step-label.done { color: #16a34a; }
    .step-label.active { color: var(--text-1); }
    .step-label.inactive { color: var(--text-3); }
    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 12px;
    }
    .step-line.done { background: #16a34a; }

    /* ─── PAGE BODY ─── */
    .page-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 48px;
      flex: 1;
      width: 100%;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 24px;
    }

    /* ─── 2カラム ─── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
      align-items: start;
    }

    /* ─── カード共通 ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
    }
    .card-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
    }
    .card-body { padding: 20px; }

    /* ─── フォーム ─── */
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 6px;
    }
    .form-label .required {
      color: var(--danger);
      margin-left: 3px;
    }
    .form-input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-1);
      background: var(--surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-hint {
      font-size: 11.5px;
      color: var(--text-3);
      margin-top: 4px;
    }
    .field-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 次へボタン */
    .btn-next {
      width: 100%;
      padding: 12px;
      background: #febd69;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #131921;
      font-family: inherit;
      cursor: pointer;
      margin-top: 20px;
      transition: background .15s, box-shadow .15s;
    }
    .btn-next:hover {
      background: #f3a847;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    /* ─── カートサマリー ─── */
    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .summary-item:last-of-type { border-bottom: none; }
    .summary-item-name {
      color: var(--text-1);
      font-weight: 500;
      flex: 1;
    }
    .summary-item-qty {
      color: var(--text-3);
      font-size: 12px;
      white-space: nowrap;
    }
    .summary-item-price {
      color: var(--text-1);
      font-weight: 600;
      white-space: nowrap;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 4px;
      border-top: 2px solid var(--text-1);
    }
    .summary-total-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
    }
    .summary-total-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--danger);
    }
    .summary-empty {
      font-size: 13px;
      color: var(--text-3);
      text-align: center;
      padding: 16px 0;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      .step-label { display: none; }
    }
  </style>
</head>
<body>

  <!-- 共通ヘッダー -->
  <div th:replace="~{header :: common-header}"></div>

  <!-- ステップバー -->
  <div class="step-bar">
    <div class="step-inner">
      <div class="step-item">
        <div class="step-circle done">✓</div>
        <span class="step-label done">カート</span>
      </div>
      <div class="step-line done"></div>
      <div class="step-item">
        <div class="step-circle done">✓</div>
        <span class="step-label done">購入確認</span>
      </div>
      <div class="step-line done"></div>
      <div class="step-item">
        <div class="step-circle active">3</div>
        <span class="step-label active">住所入力</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-circle inactive">4</div>
        <span class="step-label inactive">注文確認</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-circle inactive">5</div>
        <span class="step-label inactive">完了</span>
      </div>
    </div>
  </div>

  <div class="page-body">
    <h1 class="page-title">配送先住所を入力</h1>

    <div class="layout">

      <!-- 左：フォーム -->
      <div class="card">
        <div class="card-header">
          <h2>お届け先情報</h2>
        </div>
        <div class="card-body">
          <form th:action="@{/order/address}" th:object="${order_form}" method="post">

            <div class="form-group">
              <label class="form-label">
                郵便番号 <span class="required">*</span>
              </label>
              <input class="form-input" type="text" th:field="*{postal_code}"
                     placeholder="例：123-4567" />
              <p class="form-hint">ハイフンあり・なしどちらでも可</p>
              <div class="field-error" th:if="${#fields.hasErrors('postal_code')}"
                   th:errors="*{postal_code}">エラー</div>
            </div>

            <div class="form-group">
              <label class="form-label">
                住所 <span class="required">*</span>
              </label>
              <input class="form-input" type="text" th:field="*{delivery_address}"
                     placeholder="例：東京都新宿区西新宿1-1-1" />
              <div class="field-error" th:if="${#fields.hasErrors('delivery_address')}"
                   th:errors="*{delivery_address}">エラー</div>
            </div>

            <div class="form-group">
              <label class="form-label">
                お名前 <span class="required">*</span>
              </label>
              <input class="form-input" type="text" th:field="*{customer_name}"
                     placeholder="例：山田 太郎" />
              <div class="field-error" th:if="${#fields.hasErrors('customer_name')}"
                   th:errors="*{customer_name}">エラー</div>
            </div>

            <div class="form-group">
              <label class="form-label">
                電話番号 <span class="required">*</span>
              </label>
              <input class="form-input" type="text" th:field="*{phone_number}"
                     placeholder="例：03-1234-5678" />
              <p class="form-hint">数字とハイフンで入力してください</p>
              <div class="field-error" th:if="${#fields.hasErrors('phone_number')}"
                   th:errors="*{phone_number}">エラー</div>
            </div>

            <button type="submit" class="btn-next">次へ進む →</button>
          </form>
        </div>
      </div>

      <!-- 右：注文サマリー -->
      <div class="card">
        <div class="card-header">
          <h2>注文内容</h2>
        </div>
        <div class="card-body">
          <div th:if="${cart == null or #lists.isEmpty(cart.items)}" class="summary-empty">
            カートが空です
          </div>
          <div th:if="${cart != null and !#lists.isEmpty(cart.items)}">
            <div th:each="item : ${cart.items}" class="summary-item">
              <span class="summary-item-name"
                    th:text="${item.product_form.product_name}">商品名</span>
              <span class="summary-item-qty"
                    th:text="'×' + ${item.quantity}">×1</span>
              <span class="summary-item-price"
                    th:text="${#numbers.formatInteger(item.product_form.price * item.quantity, 1, 'COMMA')} + '円'">0円</span>
            </div>
            <div class="summary-total">
              <span class="summary-total-label">合計</span>
              <span class="summary-total-price"
                    th:text="${#numbers.formatInteger(total_amount, 1, 'COMMA')} + '円'">0円</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 共通フッター -->
  <div th:replace="~{footer :: common-footer}"></div>
</body>
</html>
