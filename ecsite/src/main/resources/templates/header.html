<!-- fragments/header.html -->
<div th:fragment="common-header">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    .site-header *, .site-header *::before, .site-header *::after {
      box-sizing: border-box; margin: 0; padding: 0;
    }
    .site-header {
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ─── TOP BAR ─── */
    .hdr-top {
      background: #131921;
      padding: 0 16px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ロゴ */
    .hdr-logo {
      flex-shrink: 0;
      text-decoration: none;
      padding: 6px 8px;
      border: 2px solid transparent;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .15s;
    }
    .hdr-logo:hover { border-color: #ffffff; }
    .hdr-logo-icon { font-size: 20px; }
    .hdr-logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      line-height: 1;
    }
    .hdr-logo-sub {
      font-size: 10px;
      color: #cccccc;
      display: block;
      font-weight: 400;
    }

    /* 検索バー */
    .hdr-search {
      flex: 1;
      max-width: 720px;
      display: flex;
      height: 38px;
    }
    .hdr-search-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 14px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      border-radius: 4px 0 0 4px;
      background: #ffffff;
    }
    .hdr-search-input::placeholder { color: #999; }
    .hdr-search-btn {
      width: 46px;
      background: #febd69;
      border: none;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      font-size: 17px;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hdr-search-btn:hover { background: #f3a847; }

    /* 右側エリア */
    .hdr-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    /* 汎用ヘッダーボタン */
    .hdr-btn {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6px 10px;
      border: 2px solid transparent;
      border-radius: 3px;
      text-decoration: none;
      color: #ffffff;
      cursor: pointer;
      background: none;
      font-family: inherit;
      transition: border-color .15s;
      white-space: nowrap;
      line-height: 1.3;
    }
    .hdr-btn:hover { border-color: #ffffff; }
    .hdr-btn-sub {
      font-size: 11px;
      color: #cccccc;
      font-weight: 400;
    }
    .hdr-btn-main {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
    }

    /* カートボタン */
    .hdr-cart {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border: 2px solid transparent;
      border-radius: 3px;
      text-decoration: none;
      color: #ffffff;
      transition: border-color .15s;
    }
    .hdr-cart:hover { border-color: #ffffff; }
    .hdr-cart-wrap {
      position: relative;
      display: flex;
      align-items: flex-end;
    }
    .hdr-cart-icon { font-size: 26px; }
    .hdr-cart-count {
      position: absolute;
      top: -4px;
      right: -6px;
      background: #febd69;
      color: #131921;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .hdr-cart-label {
      font-size: 13px;
      font-weight: 700;
    }

    /* ─── BOTTOM NAV BAR ─── */
    .hdr-nav {
      background: #232f3e;
      padding: 0 16px;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .hdr-nav::-webkit-scrollbar { display: none; }
    .hdr-nav-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 10px;
      height: 36px;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      border: 2px solid transparent;
      border-top: none;
      border-bottom: none;
      border-radius: 2px;
      transition: border-color .15s;
    }
    .hdr-nav-item:hover { border-color: #ffffff; }

    @media (max-width: 640px) {
      .hdr-logo-text { font-size: 13px; }
      .hdr-btn-sub { display: none; }
      .hdr-nav { display: none; }
    }
  </style>

  <header class="site-header">
    <!-- メインバー -->
    <div class="hdr-top">

      <!-- ロゴ -->
      <a th:href="@{/}" class="hdr-logo">
        <span class="hdr-logo-icon">🛍</span>
        <span class="hdr-logo-text">
          サンプルEC
          <span class="hdr-logo-sub">.co.jp</span>
        </span>
      </a>

      <!-- 検索フォーム -->
      <form class="hdr-search" th:action="@{/search}" method="get">
        <input class="hdr-search-input" type="text" name="query" placeholder="商品を検索する">
        <button class="hdr-search-btn" type="submit">🔍</button>
      </form>

      <!-- 右側 -->
      <div class="hdr-right">

        <!-- ログイン済み -->
        <div sec:authorize="#authentication.principal != 'anonymousUser'"
             style="display:flex;align-items:center;gap:4px;">
          <span class="hdr-btn" style="cursor:default;">
            <span class="hdr-btn-sub">こんにちは、<span sec:authentication="name"></span>さん</span>
            <span class="hdr-btn-main">アカウント</span>
          </span>
          <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="hdr-btn">
              <span class="hdr-btn-sub">サインアウト</span>
              <span class="hdr-btn-main">ログアウト</span>
            </button>
          </form>
        </div>

        <!-- 未ログイン -->
        <div sec:authorize="#authentication.principal == 'anonymousUser'">
          <a th:href="@{/login}" class="hdr-btn">
            <span class="hdr-btn-sub">サインイン</span>
            <span class="hdr-btn-main">ログイン &rsaquo;</span>
          </a>
        </div>

        <!-- カート -->
        <a th:href="@{/cart}" class="hdr-cart">
          <div class="hdr-cart-wrap">
            <span class="hdr-cart-icon">🛒</span>
            <span class="hdr-cart-count"
                  th:text="${session.cart != null ? session.cart.totalQuantity : 0}">0</span>
          </div>
          <span class="hdr-cart-label">カート</span>
        </a>

      </div>
    </div>

    <!-- ナビバー -->
    <nav class="hdr-nav">
      <a th:href="@{/}" class="hdr-nav-item">🏠 トップ</a>
      <a th:href="@{/search}" class="hdr-nav-item">📦 すべての商品</a>
      <a th:href="@{/search?query=家電}" class="hdr-nav-item">💻 家電</a>
      <a th:href="@{/search?query=本}" class="hdr-nav-item">📚 本</a>
      <a th:href="@{/search?query=ファッション}" class="hdr-nav-item">👕 ファッション</a>
    </nav>
  </header>
</div>
