<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${product.product_name} + ' - サンプルECサイト'">商品詳細</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f0f2f5;
      --surface:     #ffffff;
      --accent:      #2563eb;
      --accent-dark: #1d4ed8;
      --accent-light:#eff6ff;
      --danger:      #dc2626;
      --success:     #16a34a;
      --text-1:      #0f172a;
      --text-2:      #475569;
      --text-3:      #94a3b8;
      --border:      #e2e8f0;
      --radius:      12px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07);
      --shadow-md:   0 4px 12px rgba(0,0,0,.09);
    }

    body {
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── BREADCRUMB ─── */
    .breadcrumb-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }
    .breadcrumb-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--text-3);
    }
    .breadcrumb-inner a {
      color: var(--accent);
      text-decoration: none;
    }
    .breadcrumb-inner a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--border); }
    .breadcrumb-current { color: var(--text-2); }

    /* ─── PAGE BODY ─── */
    .page-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 48px;
      flex: 1;
      width: 100%;
    }

    /* ─── MAIN LAYOUT ─── */
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 28px;
      align-items: start;
    }

    /* ─── LEFT: IMAGE ─── */
    .product-img-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }
    .product-img-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 24px;
    }

    /* ─── RIGHT: INFO ─── */
    .product-info-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 商品情報カード */
    .product-info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }

    .product-category-badge {
      display: inline-flex;
      align-items: center;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
      margin-bottom: 10px;
    }

    .product-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.4;
      letter-spacing: -.02em;
      margin-bottom: 16px;
    }

    .product-price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .product-price-label {
      font-size: 12px;
      color: var(--text-3);
    }
    .product-price {
      font-size: 28px;
      font-weight: 700;
      color: var(--danger);
      letter-spacing: -.03em;
    }
    .product-price-unit {
      font-size: 14px;
      color: var(--text-3);
      font-weight: 400;
    }

    .product-description {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.8;
    }

    /* 在庫・購入カード */
    .product-buy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .stock-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13.5px;
    }
    .stock-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stock-dot.in  { background: var(--success); }
    .stock-dot.low { background: #f59e0b; }
    .stock-dot.out { background: var(--danger); }
    .stock-label.in  { color: var(--success); font-weight: 600; }
    .stock-label.low { color: #d97706; font-weight: 600; }
    .stock-label.out { color: var(--danger); font-weight: 600; }
    .stock-count { color: var(--text-3); font-size: 12.5px; }

    /* 数量セレクター */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .qty-label {
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
      white-space: nowrap;
    }
    .qty-input {
      width: 70px;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-1);
      text-align: center;
      outline: none;
      transition: border-color .15s;
    }
    .qty-input:focus { border-color: var(--accent); }

    /* カートに追加ボタン */
    .btn-add-cart {
      width: 100%;
      padding: 12px;
      background: #febd69;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #131921;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }
    .btn-add-cart:hover:not(:disabled) {
      background: #f3a847;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .btn-add-cart:disabled {
      background: var(--border);
      color: var(--text-3);
      cursor: not-allowed;
    }

    /* ログインを促すメッセージ */
    .login-prompt {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: var(--accent-light);
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 13px;
      color: var(--accent);
    }
    .login-prompt a {
      font-weight: 600;
      color: var(--accent-dark);
      text-decoration: none;
    }
    .login-prompt a:hover { text-decoration: underline; }

    /* エラーバナー */
    .error-banner {
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 戻るリンク */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-top: 4px;
    }
    .back-link:hover { text-decoration: underline; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .product-layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 480px) {
      .page-body { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- 共通ヘッダー -->
  <div th:replace="~{header :: common-header}"></div>

  <!-- パンくずリスト -->
  <div class="breadcrumb-bar">
    <div class="breadcrumb-inner">
      <a th:href="@{/}">トップ</a>
      <span class="breadcrumb-sep">›</span>
      <a th:href="@{/search}">商品一覧</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current" th:text="${product.product_name}">商品名</span>
    </div>
  </div>

  <div class="page-body">

    <!-- エラー -->
    <div th:if="${error}" class="error-banner" style="margin-bottom:20px;">
      ⚠️ <span th:text="${error}"></span>
    </div>

    <div class="product-layout">

      <!-- 左：商品画像 -->
      <div class="product-img-card">
        <img th:src="${product.image_url}" alt="商品画像"
             onerror="this.style.opacity='.3'">
      </div>

      <!-- 右：情報＋購入エリア -->
      <div class="product-info-col">

        <!-- 商品情報 -->
        <div class="product-info-card">
          <div class="product-category-badge">
            カテゴリー <span th:text="${product.category_id}"></span>
          </div>
          <h1 class="product-name" th:text="${product.product_name}">商品名</h1>
          <div class="product-price-row">
            <span class="product-price-label">価格</span>
            <span class="product-price"
                  th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')}">0</span>
            <span class="product-price-unit">円（税込）</span>
          </div>
          <p class="product-description" th:text="${product.description}">商品説明</p>
        </div>

        <!-- 購入ボックス -->
        <div class="product-buy-card">

          <!-- 在庫状態 -->
          <div class="stock-row" th:if="${product.stock_quantity != null}">
            <span th:class="${product.stock_quantity <= 0} ? 'stock-dot out'
                            : (${product.stock_quantity} <= 5 ? 'stock-dot low' : 'stock-dot in')"></span>
            <span th:class="${product.stock_quantity <= 0} ? 'stock-label out'
                            : (${product.stock_quantity} <= 5 ? 'stock-label low' : 'stock-label in')"
                  th:text="${product.stock_quantity <= 0} ? '在庫切れ'
                           : (${product.stock_quantity} <= 5 ? '残りわずか' : '在庫あり')">在庫あり</span>
            <span class="stock-count"
                  th:if="${product.stock_quantity > 0}"
                  th:text="'（残り ' + ${product.stock_quantity} + ' 個）'"></span>
          </div>

          <!-- ログイン済み：購入フォーム -->
          <div sec:authorize="isFullyAuthenticated()">
            <form th:action="@{/cart/add}" method="post"
                  style="display:flex;flex-direction:column;gap:12px;">
              <input type="hidden" name="product_id" th:value="${product.product_id}"/>

              <!-- 数量 -->
              <div class="qty-row" th:if="${product.stock_quantity > 0}">
                <span class="qty-label">数量</span>
                <input class="qty-input" type="number" name="quantity"
                       value="1" min="1"
                       th:max="${product.stock_quantity}"
                       th:disabled="${product.stock_quantity <= 0}"/>
              </div>

              <button type="submit" class="btn-add-cart"
                      th:disabled="${product.stock_quantity <= 0}"
                      th:text="${product.stock_quantity <= 0} ? '在庫切れ' : 'カートに追加'">
                カートに追加
              </button>
            </form>
          </div>

          <!-- 未ログイン -->
          <div sec:authorize="!isFullyAuthenticated()">
            <div class="login-prompt">
              🔑 購入には
              <a th:href="@{/login}">ログイン</a>
              が必要です
            </div>
          </div>

          <!-- フラッシュエラー -->
          <div th:if="${error}" class="error-banner">
            ⚠️ <span th:text="${error}"></span>
          </div>

        </div>

        <!-- 戻るリンク -->
        <a th:href="@{/}" class="back-link">← トップページへ戻る</a>

      </div>
    </div>
  </div>

  <!-- 共通フッター -->
  <div th:replace="~{footer :: common-footer}"></div>
</body>
</html>
