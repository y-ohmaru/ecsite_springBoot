<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>管理画面 | 商品一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }

        .admin-header {
            margin-bottom: 20px;
        }

        .admin-header h2 {
            margin-bottom: 8px;
            color: #333;
        }

        .admin-header p {
            color: #666;
            margin: 0;
        }

        .admin-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .admin-actions a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-new {
            background-color: #2d7ff9;
            color: white;
        }

        .btn-back {
            background-color: #f1f1f1;
            color: #333;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
        }

        .admin-table th,
        .admin-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        .admin-table th {
            background-color: #f5f5f5;
            color: #333;
        }

        .admin-table img {
            width: 80px;
            height: auto;
            border-radius: 4px;
        }

        .action-links a {
            margin-right: 10px;
            text-decoration: none;
            color: #2d7ff9;
            font-size: 14px;
        }

        .action-links a.delete-link {
            color: #d9534f;
        }

        .empty-message {
            margin-top: 20px;
            padding: 20px;
            background-color: #fafafa;
            border: 1px solid #ddd;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div th:replace="~{header :: common-header}"></div>

    <main class="admin-container">
        <section class="admin-header">
            <h2>管理画面 - 商品一覧</h2>
            <p>登録済み商品の確認・編集・削除を行います。</p>
        </section>

        <div class="admin-actions">
            <a th:href="@{/admin}" class="btn-back">管理画面トップへ戻る</a>
            <a th:href="@{/admin/products/create}" class="btn-new">商品を新規登録</a>
        </div>

        <table class="admin-table" th:if="${products != null and !#lists.isEmpty(products)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>画像</th>
                    <th>商品名</th>
                    <th>価格</th>
                    <th>在庫数</th>
                    <th>カテゴリID</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.product_id}">1</td>
                    <td>
                        <img th:if="${product.image_url != null and product.image_url != ''}"
                             th:src="${product.image_url}" alt="商品画像">
                        <span th:if="${product.image_url == null or product.image_url == ''}">画像なし</span>
                    </td>
                    <td th:text="${product.product_name}">商品名</td>
                    <td th:text="${product.price} + ' 円'">1000 円</td>
                    <td th:text="${product.stock_quantity}">10</td>
                    <td th:text="${product.category_id}">1</td>
                    <td class="action-links">
                        <a th:href="@{/admin/products/edit/{id}(id=${product.product_id})}">編集</a>
                        <a th:href="@{/admin/products/delete/{id}(id=${product.product_id})}"
                           class="delete-link"
                           onclick="return confirm('この商品を削除しますか？');">削除</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="empty-message" th:if="${products == null or #lists.isEmpty(products)}">
            商品が登録されていません。
        </div>
    </main>

    <div th:replace="~{footer :: common-footer}"></div>
</body>
</html>
