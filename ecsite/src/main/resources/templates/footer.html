<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>フッター</title></head>
<body>
<div th:fragment="common-footer">
  <style>
    .site-footer *, .site-footer *::before, .site-footer *::after {
      box-sizing: border-box; margin: 0; padding: 0;
    }
    .site-footer {
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      margin-top: 40px;
    }

    /* ─── BACK TO TOP ─── */
    .footer-top-btn {
      display: block;
      width: 100%;
      background: #37475a;
      color: #ffffff;
      text-align: center;
      padding: 14px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background .15s;
    }
    .footer-top-btn:hover { background: #485769; }

    /* ─── MAIN FOOTER ─── */
    .footer-main {
      background: #232f3e;
      padding: 36px 16px 24px;
    }
    .footer-cols {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 28px;
      margin-bottom: 32px;
    }
    .footer-col-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .footer-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .footer-col ul li a {
      font-size: 13px;
      color: #cccccc;
      text-decoration: none;
      transition: color .15s;
    }
    .footer-col ul li a:hover { color: #ffffff; }

    /* ─── BOTTOM BAR ─── */
    .footer-bottom {
      background: #131921;
      padding: 16px;
    }
    .footer-bottom-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .footer-logo-icon { font-size: 18px; }
    .footer-logo-text {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
    }
    .footer-copy {
      font-size: 12px;
      color: #888888;
    }

    @media (max-width: 640px) {
      .footer-cols { grid-template-columns: repeat(2, 1fr); gap: 20px; }
      .footer-bottom-inner { justify-content: center; text-align: center; }
    }
  </style>

  <footer class="site-footer">

    <!-- トップへ戻る -->
    <button class="footer-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
      ▲ トップへ戻る
    </button>

    <!-- メインフッター -->
    <div class="footer-main">
      <div class="footer-cols">

        <div class="footer-col">
          <div class="footer-col-title">お買い物について</div>
          <ul>
            <li><a th:href="@{/}">トップページ</a></li>
            <li><a th:href="@{/search}">商品一覧</a></li>
            <li><a th:href="@{/cart}">カートを見る</a></li>
            <li><a th:href="@{/purchase/confirm}">ご注文手続き</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <div class="footer-col-title">カテゴリー</div>
          <ul>
            <li><a th:href="@{/search?query=家電}">家電</a></li>
            <li><a th:href="@{/search?query=本}">本</a></li>
            <li><a th:href="@{/search?query=ファッション}">ファッション</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <div class="footer-col-title">アカウント</div>
          <ul>
            <li><a th:href="@{/login}">ログイン</a></li>
            <li><a th:href="@{/register}">新規登録</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <div class="footer-col-title">サイト情報</div>
          <ul>
            <li><a href="#">利用規約</a></li>
            <li><a href="#">プライバシーポリシー</a></li>
            <li><a href="#">お問い合わせ</a></li>
          </ul>
        </div>

      </div>
    </div>

    <!-- ボトムバー -->
    <div class="footer-bottom">
      <div class="footer-bottom-inner">
        <a th:href="@{/}" class="footer-logo">
          <span class="footer-logo-icon">🛍</span>
          <span class="footer-logo-text">サンプルECサイト</span>
        </a>
        <span class="footer-copy">&copy; 2025 サンプルECサイト. All rights reserved.</span>
      </div>
    </div>

  </footer>
</div>
</body>
</html>
