<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>共通フッター</title>
</head>
<body>
  <style>
    .site-footer {
      background: #0f172a;
      border-top: 1px solid #1e293b;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      color: #94a3b8;
      margin-top: auto;
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 36px 28px 24px;
    }

    /* ─── TOP ROW ─── */
    .footer-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    /* Brand */
    .footer-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .footer-brand-icon {
      width: 30px; height: 30px;
      background: #2563eb;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .footer-brand-name {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.02em;
    }

    /* Nav links */
    .footer-nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .footer-nav a {
      font-size: 12.5px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      transition: color .15s;
    }
    .footer-nav a:hover { color: #94a3b8; }

    /* ─── DIVIDER ─── */
    .footer-divider {
      height: 1px;
      background: #1e293b;
      margin-bottom: 20px;
    }

    /* ─── BOTTOM ROW ─── */
    .footer-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-copy {
      font-size: 12px;
      color: #475569;
    }
    .footer-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      color: #334155;
      background: #1e293b;
      border: 1px solid #293548;
      border-radius: 20px;
      padding: 3px 10px;
    }

    @media (max-width: 640px) {
      .footer-top { flex-direction: column; gap: 20px; }
      .footer-bottom { justify-content: center; text-align: center; }
    }
  </style>

  <div th:fragment="common-footer">
    <footer class="site-footer">
      <div class="footer-inner">

        <!-- トップ行 -->
        <div class="footer-top">
          <a th:href="@{/}" class="footer-brand">
            <div class="footer-brand-icon">🛍</div>
            <span class="footer-brand-name">サンプルECサイト</span>
          </a>
          <nav class="footer-nav">
            <a th:href="@{/}">トップ</a>
            <a th:href="@{/search}">商品一覧</a>
            <a th:href="@{/cart}">カート</a>
            <a th:href="@{/login}">ログイン</a>
          </nav>
        </div>

        <div class="footer-divider"></div>

        <!-- ボトム行 -->
        <div class="footer-bottom">
          <span class="footer-copy">&copy; 2025 サンプルECサイト. All rights reserved.</span>
          <span class="footer-badge">⚡ Spring Boot</span>
        </div>

      </div>
    </footer>
  </div>
</body>
</html>
